<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Mike Malburg</title>
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
</head>
<body>
  <header>
    <nav>
      <a href="{{ site.baseurl }}/" class="logo">Mike Malburg</a>
      <ul>
        <li><a href="{{ site.baseurl }}/" {% if page.url == "/" %}class="active"{% endif %}>Home</a></li>
         <li><a href="{{ site.baseurl }}/about.html" {% if page.url == "/about" %}class="active"{% endif %}>About</a></li>
        <li><a href="{{ site.baseurl }}/projects.html" {% if page.url == "/projects" %}class="active"{% endif %}>Projects</a></li>
        <li><a href="{{ site.baseurl }}/contact.html" {% if page.url == "/contact" %}class="active"{% endif %}>Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} Mike Malburg</p>
    <p>Design: OpenCode-inspired palette</p>
  </footer>
</body>
</html>
